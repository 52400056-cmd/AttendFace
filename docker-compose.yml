version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: diemdanh
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: CSDLdiemdanh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: