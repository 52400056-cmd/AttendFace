{% extends "base.html" %}

{% block title %}Đăng ký khuôn mặt - FaceAttend{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <h4 class="mb-4 text-primary fw-bold">
            <i class="bi bi-person-bounding-box me-2"></i>Thu thập FaceID: {{ user.full_name }}
        </h4>
        
        <div class="position-relative d-inline-block rounded-4 shadow-lg overflow-hidden" style="width: 640px; height: 480px; background: #1a1a1a; border: 3px solid #dee2e6;" id="camera-container">
            <video id="webcam" autoplay playsinline style="width: 640px; height: 480px; object-fit: cover; transform: scaleX(-1);"></video>
            <canvas id="output_canvas" style="position: absolute; top: 0; left: 0; width: 640px; height: 480px; transform: scaleX(-1);"></canvas>
            
            <div id="countdown" class="position-absolute top-50 start-50 translate-middle display-1 fw-bold text-white" style="display: none; text-shadow: 0px 0px 20px rgba(0, 255, 0, 0.8); z-index: 20;">3</div>
            
            <div class="position-absolute bottom-0 w-100 pb-4" style="z-index: 10;">
                <div id="feedback" class="d-inline-block px-4 py-2 rounded-pill text-white fw-bold shadow" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); font-size: 1.1rem; transition: all 0.3s;">
                    Nhấn "Bắt đầu" để mở Camera
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button id="start-btn" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">
                <i class="bi bi-camera-video-fill me-2"></i>Bắt đầu Camera
            </button>
            <button id="capture-btn" class="btn btn-success btn-lg px-5 rounded-pill shadow-sm d-none" disabled>
                <i class="bi bi-shield-lock me-2"></i>Đang phân tích...
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const feedback = document.getElementById('feedback');
    const startBtn = document.getElementById('start-btn');
    const captureBtn = document.getElementById('capture-btn');
    const countdownEl = document.getElementById('countdown');
    const container = document.getElementById('camera-container');

    let holdTimer = null;
    let secondsLeft = 3;
    let isCapturing = false;
    let lastValidBbox = null;

    function drawCorners(ctx, x, y, w, h, color) {
        const len = 30; 
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x, y + len); ctx.lineTo(x, y); ctx.lineTo(x + len, y);
        ctx.moveTo(x + w - len, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + len);
        ctx.moveTo(x, y + h - len); ctx.lineTo(x, y + h); ctx.lineTo(x + len, y + h);
        ctx.moveTo(x + w - len, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - len);
        ctx.stroke();
    }

    function updateFeedback(msg, bgColor, borderColor) {
        feedback.innerHTML = msg;
        feedback.style.background = bgColor;
        container.style.borderColor = borderColor;
    }

    function onResults(results) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (results.detections.length > 0) {
            const detection = results.detections[0];
            const bbox = detection.boundingBox;
            const landmarks = detection.landmarks;
            
            const x = bbox.xCenter * canvas.width - (bbox.width * canvas.width) / 2;
            const y = bbox.yCenter * canvas.height - (bbox.height * canvas.height) / 2;
            const w = bbox.width * canvas.width;
            const h = bbox.height * canvas.height;

            const eyeTilt = Math.abs(landmarks[0].y - landmarks[1].y);
            const isHeadTilted = eyeTilt > 0.04; 

            let isFaceValid = false;
            let color = '#ffc107'; 

            if (bbox.width < 0.28) {
                updateFeedback("Vui lòng tiến lại gần camera", "rgba(255, 193, 7, 0.8)", "#ffc107");
            } else if (bbox.width > 0.6) {
                updateFeedback("Vui lòng lùi ra xa một chút", "rgba(255, 193, 7, 0.8)", "#ffc107");
            } else if (bbox.xCenter < 0.35 || bbox.xCenter > 0.65 || bbox.yCenter < 0.35 || bbox.yCenter > 0.65) {
                updateFeedback("Đưa khuôn mặt vào giữa khung hình", "rgba(255, 193, 7, 0.8)", "#ffc107");
            } else if (isHeadTilted) {
                updateFeedback("Vui lòng giữ đầu thẳng, không nghiêng", "rgba(220, 53, 69, 0.8)", "#dc3545");
                color = '#dc3545';
            } else {
                isFaceValid = true;
                color = '#198754'; 
                lastValidBbox = bbox; 
            }

            drawCorners(ctx, x, y, w, h, color);

            if (isFaceValid) {
                if (!holdTimer && !isCapturing) startCountdown();
                updateFeedback(`Hợp lệ! Giữ yên... ${secondsLeft}`, "rgba(25, 135, 84, 0.9)", "#198754");
            } else {
                resetCountdown();
            }
        } else {
            resetCountdown();
            updateFeedback("Không tìm thấy khuôn mặt", "rgba(0, 0, 0, 0.7)", "#dee2e6");
        }
    }

    function startCountdown() {
        countdownEl.style.display = 'block';
        countdownEl.innerText = secondsLeft;
        holdTimer = setInterval(() => {
            secondsLeft--;
            if (secondsLeft > 0) {
                countdownEl.innerText = secondsLeft;
                updateFeedback(`Hợp lệ! Giữ yên... ${secondsLeft}`, "rgba(25, 135, 84, 0.9)", "#198754");
            } else if (secondsLeft === 0) {
                clearInterval(holdTimer);
                captureAndCropImage();
            }
        }, 1000);
    }

    function resetCountdown() {
        if (holdTimer) clearInterval(holdTimer);
        holdTimer = null;
        secondsLeft = 3;
        countdownEl.style.display = 'none';
    }

    async function captureAndCropImage() {
        isCapturing = true;
        updateFeedback("📸 Đang trích xuất Vector AI...", "rgba(13, 110, 253, 0.9)", "#0d6efd");
        countdownEl.style.display = 'none';
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 224; 
        tempCanvas.height = 224;
        const tCtx = tempCanvas.getContext('2d');

        const videoW = video.videoWidth;
        const videoH = video.videoHeight;
        const fw = lastValidBbox.width * videoW;
        const fh = lastValidBbox.height * videoH;
        
        const fx = (lastValidBbox.xCenter * videoW) - (fw / 2);
        const fy = (lastValidBbox.yCenter * videoH) - (fh / 2);

        tCtx.drawImage(video, fx, fy, fw, fh, 0, 0, 224, 224);
        const finalBase64Image = tempCanvas.toDataURL('image/jpeg', 0.9);

        const response = await fetch('/api/save-face', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({image: finalBase64Image})
        });

        if (response.ok) {
            updateFeedback("🎉 Đăng ký thành công!", "rgba(25, 135, 84, 0.9)", "#198754");
            setTimeout(() => {
                window.location.href = "/";
            }, 1000);
        } else {
            alert("Có lỗi xảy ra khi lưu ảnh!");
            isCapturing = false;
        }
    }

    startBtn.onclick = () => {
        startBtn.classList.add('d-none');
        captureBtn.classList.remove('d-none');
        updateFeedback("Đang khởi động Camera...", "rgba(0,0,0,0.6)", "#dee2e6");
        
        canvas.width = 640; canvas.height = 480;

        const camera = new Camera(video, {
            onFrame: async () => { await faceDetection.send({image: video}); },
            width: 640, height: 480
        });
        camera.start();
    };

    const faceDetection = new FaceDetection({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${f}`});
    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.7 });
    faceDetection.onResults(onResults);
</script>
{% endblock %}
