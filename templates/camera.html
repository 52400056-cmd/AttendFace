<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Màn Hình Điểm Danh Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #000; overflow: hidden; margin: 0; padding: 0; }
        #persistent-status { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; z-index: 100; transition: all 0.3s; }
        #camera-container { width: 100vw; height: 100vh; position: relative; }
        #outputCanvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="videoElement" autoplay playsinline style="display: none;"></video>
    <canvas id="outputCanvas" width="1280" height="720"></canvas>

    <div id="ai-alert" class="position-absolute top-0 start-50 translate-middle-x mt-5 py-3 px-5 rounded-pill fw-bold text-white shadow-lg fs-4" style="display: none; background-color: rgba(0,0,0,0.7); backdrop-filter: blur(8px);">
    </div>

    <div id="persistent-status" class="alert alert-dark d-flex align-items-center shadow-lg rounded-5 p-4 border border-secondary" style="background-color: rgba(30,30,30,0.85); backdrop-filter: blur(10px);">
        <div id="persistent-icon" class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center me-4" style="width: 80px; height: 80px;">
            <i class="bi bi-camera-video fs-1"></i>
        </div>
        <div>
            <h2 class="mb-1 fw-bold text-white" id="persistent-title">Sẵn sàng điểm danh</h2>
            <p id="persistent-desc" class="mb-0 fs-5 text-secondary">Vui lòng bước vào khu vực camera và nhìn thẳng.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>

<script>
    const videoElement = document.getElementById('videoElement');
    const canvasElement = document.getElementById('outputCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const aiAlert = document.getElementById('ai-alert');
    
    const persistentStatus = document.getElementById('persistent-status');
    const persistentTitle = document.getElementById('persistent-title');
    const persistentDesc = document.getElementById('persistent-desc');
    const persistentIcon = document.getElementById('persistent-icon');
    
    let ws = null;
    let camera = null;
    let lastSendTime = 0;
    let boxColor = "#FFD700"; 
    let recognizeSuccessTimer = null;

    function showCanvasWarning(msg, colorClass) {
        aiAlert.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-3 ${colorClass}"></i>${msg}`;
        aiAlert.style.display = 'block';
    }
    function hideCanvasWarning() { aiAlert.style.display = 'none'; }

    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${window.location.host}/ws/attendance/{{ session.id }}`);

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.status === "success") {
            hideCanvasWarning();
            
            persistentStatus.style.backgroundColor = "rgba(25, 135, 84, 0.9)";
            persistentStatus.style.borderColor = "#198754";
            persistentIcon.className = "bg-white text-success rounded-circle d-flex align-items-center justify-content-center me-4";
            persistentIcon.innerHTML = '<i class="bi bi-check-circle-fill" style="font-size: 3rem;"></i>';
            persistentTitle.innerHTML = data.student_name;
            persistentDesc.innerHTML = `<span class="text-white">MSSV: <strong>${data.student_code}</strong> - Điểm danh thành công!</span>`;
            
            boxColor = "#00FF00"; 
            clearTimeout(recognizeSuccessTimer);
            recognizeSuccessTimer = setTimeout(() => { boxColor = "#FFD700"; }, 3000);

        } else if (data.status === "unknown") {
            boxColor = "#FF0000"; 
            clearTimeout(recognizeSuccessTimer);
            recognizeSuccessTimer = setTimeout(() => { boxColor = "#FFD700"; }, 1000);
        }
    };

    const faceDetection = new FaceDetection({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${file}`;
    }});
    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.6 });

    faceDetection.onResults((results) => {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.detections.length > 0) {
            const bbox = results.detections[0].boundingBox;
            const width = bbox.width * canvasElement.width;
            const height = bbox.height * canvasElement.height;
            const x = (bbox.xCenter * canvasElement.width) - (width / 2);
            const y = (bbox.yCenter * canvasElement.height) - (height / 2);

            canvasCtx.beginPath();
            canvasCtx.lineWidth = 6;
            canvasCtx.strokeStyle = boxColor;
            canvasCtx.rect(x, y, width, height);
            canvasCtx.stroke();

            if (width < 150) {
                canvasCtx.restore();
                showCanvasWarning("Tiến lại gần camera hơn", "text-warning");
                return;
            } else if (boxColor === "#FF0000") {
                canvasCtx.restore();
                showCanvasWarning("Vui lòng nhìn thẳng, tháo khẩu trang", "text-danger");
            } else {
                canvasCtx.restore();
                hideCanvasWarning();
            }

            const currentTime = Date.now();
            if (ws.readyState === WebSocket.OPEN && (currentTime - lastSendTime > 500)) {
                
                const vW = videoElement.videoWidth;
                const vH = videoElement.videoHeight;
                
                const fw = bbox.width * vW;
                const fh = bbox.height * vH;
                const fx = (bbox.xCenter * vW) - (fw / 2);
                const fy = (bbox.yCenter * vH) - (fh / 2);

                // console.log(`[Frontend] Đang cắt mặt tại tọa độ: x=${fx}, y=${fy}, w=${fw}, h=${fh}`);

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 224;
                tempCanvas.height = 224;
                tempCanvas.getContext('2d').drawImage(videoElement, fx, fy, fw, fh, 0, 0, 224, 224);
                
                const base64Data = tempCanvas.toDataURL('image/jpeg', 0.9);
                // console.log(`[Frontend] Đã gửi ảnh đi. Dung lượng chuỗi: ${base64Data.length} ký tự`);

                ws.send(base64Data);
                lastSendTime = currentTime;
            }
        } else {
            canvasCtx.restore();
            hideCanvasWarning();
            boxColor = "#FFD700";
        }
    });

    camera = new Camera(videoElement, {
        onFrame: async () => { await faceDetection.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>
</body>
</html>
